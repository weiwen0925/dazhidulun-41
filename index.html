<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px; --primary:#2C1810; --primary-light:#5B3A29; --shadow:rgba(91,58,41,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg); color:var(--text); line-height:1.8;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
*{-webkit-user-drag:none;}
img{-webkit-user-drag:none;pointer-events:none;}

/* Sidebar */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-decoration:none;color:var(--sbText);font-family:"Noto Sans TC",sans-serif;
  padding:5px 4px;border-radius:8px;width:62px;
  transition:background .25s,color .25s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.14);color:var(--goldL);}
.sb-item.active{background:rgba(184,134,11,.18);color:var(--goldL);
  box-shadow:0 0 12px rgba(184,134,11,.25) inset;}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--gold);margin-bottom:5px;
  transition:background .25s,color .25s;}
.sb-item.active .sb-circle,.sb-item:hover .sb-circle{
  background:var(--gold);color:#1e1a14;}
.sb-label{font-size:11px;letter-spacing:1.5px;text-align:center;line-height:1.3;}

/* Sidebar mobile */
#sbToggle{position:fixed;top:14px;left:14px;z-index:200;
  width:42px;height:42px;border-radius:8px;border:none;
  background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;
  display:none;}
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0!important;}
}

/* Read progress */
.read-progress{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
  z-index:120; background:rgba(30,26,20,.92); color:var(--gold);
  padding:9px 24px; border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px; letter-spacing:2px;
  display:flex; align-items:center; gap:12px;
  pointer-events:none; user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease, transform .45s ease;
}
.read-progress.hide-near-end{
  opacity:0;
  transform:translateX(-50%) translateY(28px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* Main + hero */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#fff;
  padding:78px 30px 64px;text-align:center;overflow:hidden;}
.hero-bg-deco{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:300px;font-weight:900;color:rgba(212,168,75,.04);
  letter-spacing:30px;pointer-events:none;font-family:"Noto Serif TC",serif;
  user-select:none;white-space:nowrap;z-index:0;}
.hero-content{position:relative;z-index:1;}
.hero-meta{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:3px;
  margin-bottom:14px;font-family:"Noto Sans TC",sans-serif;}
.hero-title{color:var(--goldL);font-size:54px;font-weight:900;
  letter-spacing:14px;margin-bottom:14px;line-height:1.2;}
.hero-subtitle{color:#fff;font-size:19px;letter-spacing:6px;margin-bottom:8px;
  font-family:"Noto Sans TC",sans-serif;font-weight:500;}
.hero-range{color:rgba(212,168,75,.85);font-size:14.5px;letter-spacing:1.5px;
  font-family:"Noto Sans TC",sans-serif;max-width:850px;margin:8px auto 0;line-height:1.7;}

/* Preface */
.preface{max-width:980px;margin:42px auto;padding:0 28px;}
.preface-title{font-size:28px;color:var(--accent);text-align:center;
  letter-spacing:6px;margin-bottom:24px;font-weight:700;}
.preface p{font-size:17px;line-height:2;color:var(--text2);
  margin-bottom:14px;text-indent:2em;}

/* TOC */
.toc-section{max-width:1100px;margin:42px auto 28px;padding:0 28px;}
.toc-title{font-size:32px;color:var(--accent);text-align:center;
  letter-spacing:8px;margin-bottom:10px;font-weight:700;}
.toc-desc{text-align:center;color:var(--text-muted);font-size:15px;
  letter-spacing:3px;margin-bottom:30px;font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 20px;text-decoration:none;color:var(--text);
  transition:transform .25s,box-shadow .25s,border-color .25s;
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:var(--gold);color:#fff;font-weight:700;font-size:15px;
  font-family:"Noto Sans TC",sans-serif;}
.toc-name{font-size:18px;color:var(--text);font-weight:600;line-height:1.6;}
.toc-sub{font-size:13.5px;color:var(--text-muted);line-height:1.7;
  font-family:"Noto Sans TC",sans-serif;}

/* Chapter section + ch-head */
.chapter{max-width:1100px;margin:32px auto;padding:0 28px;scroll-margin-top:24px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:34px 26px 30px;border-radius:14px 14px 0 0;
  position:relative;overflow:hidden;}
.ch-head::after{content:"";display:block;width:50px;height:2px;
  background:var(--goldL);margin:18px auto 0;border-radius:1px;}
.ch-num{color:#d4a84b;letter-spacing:5px;font-size:14px;margin-bottom:12px;
  font-family:"Noto Sans TC",sans-serif;}
.ch-name{color:#fff;font-size:32px;font-weight:700;letter-spacing:2px;
  margin-bottom:8px;line-height:1.4;}
.ch-sub{color:#d4c4a8;font-size:15px;letter-spacing:1.5px;
  font-family:"Noto Sans TC",sans-serif;line-height:1.6;
  max-width:780px;margin:0 auto;}
.ch-body{background:#fffdf7;border:1px solid var(--border);border-top:none;
  border-radius:0 0 14px 14px;padding:26px 24px 18px;
  box-shadow:0 6px 24px rgba(91,58,41,.06);}

/* Bridge cards */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

/* next link */
.next-link{display:inline-block;margin-top:8px;padding:10px 24px;
  background:var(--gold);color:#fff;text-decoration:none;border-radius:24px;
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  transition:background .25s,transform .25s;}
.next-link:hover{background:var(--accent);transform:translateY(-2px);}

/* Footer */
.site-footer{margin-top:48px;padding:32px 24px;text-align:center;
  background:#1e1a14;color:rgba(212,196,168,.7);
  border-top:2px solid var(--gold);}
.site-footer p{font-size:14px;letter-spacing:1.5px;margin:6px 0;
  font-family:"Noto Sans TC",sans-serif;}

/* Back to top */
#backTop{position:fixed;right:24px;bottom:78px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid rgba(184,134,11,.5);
  font-size:22px;cursor:pointer;display:none;z-index:110;
  box-shadow:0 4px 14px rgba(0,0,0,.2);}
#backTop.show{display:block;}

@media (max-width:900px){
  .site-hero{padding:60px 22px 50px;}
  .hero-title{font-size:42px;letter-spacing:8px;}
  .chapter,.preface,.toc-section{padding:0 18px;}
  .ch-name{font-size:26px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:34px;letter-spacing:6px;}
  .ch-name{font-size:22px;}
}

/* ============ 1.2x 字級放大（buddhist-text-html 新卷預設）============ */

.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.toc-sub{font-size:15px!important;line-height:1.85!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}

if(sbTog) sbTog.addEventListener('click', function(){
  sb.classList.toggle('open');
});

// ============== sb-brand click → top ==============
var sbBrand = document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0, behavior:'smooth'});
  });
}

// ============== read progress ==============
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

// ============== progress capsule fade near end ==============
(function(){
  var cap = document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){ cap.classList.toggle('hide-near-end', !!on); }
  var targets = [];
  var f1 = document.querySelector('[data-wy-notice="v2"]');
  if(f1) targets.push(f1);
  var f2 = document.querySelector('.site-footer');
  if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      var any = entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    }, {root:null, rootMargin:'0px 0px -20px 0px', threshold:0.01});
    targets.forEach(function(t){ io.observe(t); });
  } else {
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh - sb < 240);
    };
    window.addEventListener('scroll', check, {passive:true});
    check();
  }
})();

// ============== back to top ==============
var backTop = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(window.scrollY > 600) backTop.classList.add('show');
  else backTop.classList.remove('show');
}, {passive:true});
backTop.addEventListener('click', function(){
  window.scrollTo({top:0, behavior:'smooth'});
});

// ============== sidebar active highlight ==============
var chapters = document.querySelectorAll('section.chapter');
var sbItems  = document.querySelectorAll('.sb-item');
function updateActiveCh(){
  var active = -1;
  for(var i=0; i<chapters.length; i++){
    var rect = chapters[i].getBoundingClientRect();
    if(rect.top < window.innerHeight * 0.35) active = i;
  }
  sbItems.forEach(function(it, i){
    it.classList.toggle('active', i === active);
  });
  // auto-scroll sidebar
  if(active >= 0 && sbItems[active]){
    var aRect = sbItems[active].getBoundingClientRect();
    var sbRect = sb.getBoundingClientRect();
    if(aRect.bottom > sbRect.bottom - 24 || aRect.top < sbRect.top + 24){
      sb.scrollTo({top: sbItems[active].offsetTop - sb.clientHeight/2, behavior:'smooth'});
    }
  }
}
window.addEventListener('scroll', updateActiveCh, {passive:true});
updateActiveCh();

// ============== iframe auto-height (the long-blank-bug fix) ==============
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

// ============== anchor click safety (outer) ==============
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

// ============== periodic recalc ==============
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

// ============== anti-copy ==============
(function(){
  var blk = function(e){ e.preventDefault(); return false; };
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, blk, true);
  });
  document.addEventListener('mousedown', function(e){
    if(e.button === 2) blk(e);
  }, true);
  document.addEventListener('keydown', function(e){
    var k = e.key;
    if(e.ctrlKey && /^[cCaAsSpPuUxX]$/.test(k)) blk(e);
    if(k === 'F12') blk(e);
    if(e.ctrlKey && e.shiftKey && /^[IJCK]$/.test(k)) blk(e);
  }, true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  }, 300);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-41-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
